name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.146.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Hugo Extended
        run: |
          wget -q -O "${{ runner.temp }}/hugo.deb" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${{ runner.temp }}/hugo.deb"
          hugo version

      - name: Install frontend build tools
        run: |
          npm install
          echo "$(pwd)/node_modules/.bin" >> "$GITHUB_PATH"
          echo "NODE_PATH=$(pwd)/node_modules" >> "$GITHUB_ENV"
          npx --no-install postcss --version
          node -e "console.log(require.resolve('autoprefixer'))"

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Verify Hugo modules
        run: |
          go version
          hugo mod graph

      - name: Install PostCSS dependencies for Docsy module
        run: |
          DOCSY_DIR="$(find "$HOME/.cache/hugo_cache/modules/filecache/modules/pkg/mod/github.com/google" -maxdepth 1 -type d -name 'docsy@*' | head -n 1)"
          echo "Docsy module directory: ${DOCSY_DIR}"
          test -n "${DOCSY_DIR}"
          npm install --prefix "${DOCSY_DIR}" --no-audit --no-fund postcss postcss-cli autoprefixer
          node -e "console.log(require.resolve('autoprefixer', { paths: ['${DOCSY_DIR}'] }))"

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
          NODE_PATH: ${{ github.workspace }}/node_modules
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
